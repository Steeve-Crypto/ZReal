name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/steeve-crypto/zreal

jobs:
  django:
    name: Django checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run system checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: django

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            .

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

  deploy:
    name: Kubernetes deploy
    runs-on: ubuntu-latest
    needs: container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy when configured
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          if [ -z "${KUBECONFIG_B64}" ]; then
            echo "KUBECONFIG_B64 is not configured. Skipping Kubernetes deploy."
            exit 0
          fi

          echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
          export KUBECONFIG="${PWD}/kubeconfig"

          kubectl set image deployment/zreal-web web="${IMAGE}" -n zreal
          kubectl rollout status deployment/zreal-web -n zreal
