name: Deploy ZReal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/zreal:${{ github.sha }}
            ${{ secrets.REGISTRY }}/zreal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Kubernetes
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

          # Update image tag
          sed -i "s|your-registry/zreal:latest|${{ secrets.REGISTRY }}/zreal:${{ github.sha }}|g" k8s/deployment.yaml k8s/celery-worker.yaml

          kubectl apply -f k8s/ --namespace=zreal
          kubectl rollout status deployment/zreal-web -n zreal
          kubectl rollout status deployment/zreal-celery-worker -n zreal
