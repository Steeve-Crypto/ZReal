version: '3.8'

services:
  web:
    build: .
    command: gunicorn zreal.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?Set ALLOWED_HOSTS}
      - DATABASE_URL=postgres://zreal:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/zreal
      - REDIS_URL=redis://redis:6379/0
      - ZCASHRPC_USER=${ZCASHRPC_USER:-}
      - ZCASHRPC_PASSWORD=${ZCASHRPC_PASSWORD:-}
      - ZCASHRPC_HOST=${ZCASHRPC_HOST:-}
      - ZCASHRPC_PORT=${ZCASHRPC_PORT:-18232}
      - ZCASH_TX_TOOL_PATH=${ZCASH_TX_TOOL_PATH:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - ZSA_ISSUANCE_BACKEND=${ZSA_ISSUANCE_BACKEND:-zcash_tx_tool}
      - ZCASH_ZSA_ISSUE_COMMAND=${ZCASH_ZSA_ISSUE_COMMAND:-}
      - ZCASH_ZSA_STATUS_COMMAND=${ZCASH_ZSA_STATUS_COMMAND:-}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=zreal
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_DB=zreal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
