{{- if .Values.celery.worker.replicaCount }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zreal.fullname" . }}-celery-worker
  labels:
    {{- include "zreal.labels" . | nindent 4 }}
    component: celery-worker
spec:
  replicas: {{ .Values.celery.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "zreal.selectorLabels" . | nindent 6 }}
      component: celery-worker
  template:
    metadata:
      labels:
        {{- include "zreal.selectorLabels" . | nindent 8 }}
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "zreal", "worker", "--loglevel=info"]
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          resources:
            {{- toYaml .Values.celery.worker.resources | nindent 12 }}
{{- end }}
