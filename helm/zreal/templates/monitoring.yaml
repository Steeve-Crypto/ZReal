# Monitoring & Observability Configuration
# This file contains recommendations and basic ConfigMaps.
# For production, consider using managed solutions or the kube-prometheus-stack Helm chart.

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zreal.fullname" . }}-prometheus-config
  labels:
    {{- include "zreal.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'zreal'
        static_configs:
          - targets: ['{{ include "zreal.fullname" . }}:8000']
        metrics_path: /metrics
        # Note: Add /metrics endpoint in Django if using django-prometheus or similar
