apiVersion: apps/v1
kind: Deployment
metadata:
  name: zreal-celery-worker
  namespace: zreal
  labels:
    app: zreal
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zreal
      component: celery-worker
  template:
    metadata:
      labels:
        app: zreal
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/steeve-crypto/zreal:latest
          command: ["celery", "-A", "zreal", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: zreal-config
            - secretRef:
                name: zreal-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "800m"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - zreal
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - celery
                - -A
                - zreal
                - inspect
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zreal-celery-beat
  namespace: zreal
  labels:
    app: zreal
    component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zreal
      component: celery-beat
  template:
    metadata:
      labels:
        app: zreal
        component: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/steeve-crypto/zreal:latest
          command: ["celery", "-A", "zreal", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: zreal-config
            - secretRef:
                name: zreal-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
