apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zreal-ingress
  namespace: zreal
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"   # Optional
spec:
  ingressClassName: nginx
  rules:
    - host: yourdomain.com   # ← Change this
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zreal-web
                port:
                  number: 80
  tls:
    - hosts:
        - yourdomain.com
      secretName: zreal-tls
