# Kubernetes Network Policies for ZReal
# These policies implement zero-trust networking by default.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: zreal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow web pods to be accessed from Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
  namespace: zreal
spec:
  podSelector:
    matchLabels:
      app: zreal
      component: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx   # Adjust based on your ingress controller namespace
      ports:
        - protocol: TCP
          port: 8000

---
# Allow web to talk to database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-to-db
  namespace: zreal
spec:
  podSelector:
    matchLabels:
      app: zreal
      component: web
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432

---
# Allow web and celery to talk to Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-redis
  namespace: zreal
spec:
  podSelector:
    matchLabels:
      app: zreal
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

---
# Allow Celery workers to talk to database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-celery-to-db
  namespace: zreal
spec:
  podSelector:
    matchLabels:
      component: celery-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
