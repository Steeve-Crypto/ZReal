{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}ZReal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/zreal.css' %}">
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen {% block body_class %}{% endblock %}">
    {% if messages %}
        <div class="fixed right-6 top-6 z-[300] w-full max-w-md space-y-3">
            {% for message in messages %}
                <div class="glass rounded-2xl px-5 py-4 text-sm shadow-2xl {% if message.tags == 'error' %}text-red-200 border-red-500/30{% elif message.tags == 'success' %}text-emerald-200 border-emerald-500/30{% else %}text-white{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
