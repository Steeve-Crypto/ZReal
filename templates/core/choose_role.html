{% extends "base.html" %}

{% block title %}ZReal | Choose Role{% endblock %}

{% block content %}
<main class="max-w-xl mx-auto px-8 py-20">
    <div class="glass rounded-3xl border border-white/10 p-10">
        <h1 class="section-header text-4xl font-bold tracking-tight">Choose Your Role</h1>
        <p class="text-white/60 mt-3">Issuer accounts manage properties and tokenization. Investor accounts view holdings.</p>
        <form method="post" class="mt-8 space-y-5">
            {% csrf_token %}
            {{ form.role }}
            <button type="submit" class="px-6 py-3 rounded-3xl bg-gradient-to-r from-[#D4AF37] to-[#B8860B] text-[#0F172A] font-semibold">
                Continue
            </button>
        </form>
    </div>
</main>
{% endblock %}
