<div class="glass rounded-3xl p-6 premium-card">
    <h3 class="font-semibold text-lg">{{ holding.property.title }}</h3>
    <div class="text-sm text-white/50 mt-1">{{ holding.property.address }}</div>

    <div class="mt-5 flex justify-between gap-4 text-sm">
        <div>
            <div class="text-white/60">Shares Owned</div>
            <div class="font-mono text-xl">{{ holding.shares_owned }}</div>
        </div>
        <div class="text-right">
            <div class="text-white/60">Est. Value</div>
            <div class="font-mono text-xl text-emerald-400">{{ holding.estimated_position_value|default:"No data yet" }}</div>
        </div>
    </div>

    <div class="h-1.5 bg-white/10 rounded-full mt-6 overflow-hidden">
        <div class="h-1.5 bg-[#D4AF37] rounded-full" style="width: {{ holding.ownership_percent|default:0 }}%"></div>
    </div>
    <div class="text-xs text-white/50 mt-1 flex justify-between">
        <span>{{ holding.ownership_percent|floatformat:2 }}% ownership</span>
        <span>Private on Zcash</span>
    </div>
</div>
