<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZReal • Systems Trace Map | OpenTelemetry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --obsidian: #0A0A0F;
            --deep-purple: #4B0082;
            --matrix-purple: #6B46C1;
            --silver-grey: #A0AEC0;
            --light-grey: #CBD5E0;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #0A0A0F;
            color: #E2E8F0;
            font-family: 'Inter', system_ui, sans-serif;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(107, 70, 193, 0.2);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(90deg, #6B46C1, #A0AEC0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #6B46C1;
            border-radius: 50%;
            box-shadow: 0 0 12px #6B46C1;
            animation: pulse 2s infinite;
        }
        
        .legend {
            position: fixed;
            bottom: 30px;
            left: 40px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(107, 70, 193, 0.3);
            border-radius: 16px;
            padding: 20px;
            max-width: 280px;
        }
        
        .legend h4 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #A0AEC0;
            font-weight: 500;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
        
        .trace-info {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(107, 70, 193, 0.3);
            border-radius: 16px;
            padding: 20px;
            width: 320px;
            font-size: 13px;
        }
        
        .trace-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .trace-label {
            color: #A0AEC0;
        }
        
        .trace-value {
            font-family: monospace;
            color: #6B46C1;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .matrix-text {
            font-family: 'Space Grotesk', monospace;
            font-size: 11px;
            color: #6B46C1;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div style="width: 36px; height: 36px; background: linear-gradient(135deg, #4B0082, #6B46C1); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <span style="color: white; font-weight: 700; font-size: 18px;">Z</span>
            </div>
            <div>
                <span class="logo-text">ZReal</span>
                <span style="font-size: 12px; color: #A0AEC0; margin-left: 4px;">TRACE MAP</span>
            </div>
        </div>
        
        <div class="status">
            <div class="status-dot"></div>
            <span style="color: #A0AEC0;">OpenTelemetry Active • 47 traces/min</span>
        </div>
    </div>

    <!-- Canvas for Animation -->
    <canvas id="canvas"></canvas>

    <!-- Legend -->
    <div class="legend">
        <h4>SYSTEM COMPONENTS</h4>
        <div class="legend-item">
            <div class="legend-color" style="background: #6B46C1;"></div>
            <span>Web / Django</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #4B0082;"></div>
            <span>Celery Workers</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #A0AEC0;"></div>
            <span>PostgreSQL + PostGIS</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #6B46C1;"></div>
            <span>Zcash RPC / ZSA</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #4B0082;"></div>
            <span>Legal Shield (AI)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #A0AEC0;"></div>
            <span>Observability (OTel)</span>
        </div>
    </div>

    <!-- Live Trace Info -->
    <div class="trace-info">
        <h4 style="margin: 0 0 12px 0; font-size: 14px; color: #A0AEC0;">LIVE TRACE FLOW</h4>
        <div class="trace-line">
            <span class="trace-label">Current Trace</span>
            <span class="trace-value" id="trace-id">zreal-7f3a9b2c</span>
        </div>
        <div class="trace-line">
            <span class="trace-label">Span</span>
            <span class="trace-value" id="span-name">zsa_issuance</span>
        </div>
        <div class="trace-line">
            <span class="trace-label">Duration</span>
            <span class="trace-value" id="duration">142ms</span>
        </div>
        <div class="trace-line">
            <span class="trace-label">Status</span>
            <span style="color: #6B46C1; font-weight: 500;">OK</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        // Color palette - Deep Obsidian, Purple, Grey
        const colors = {
            obsidian: '#0A0A0F',
            purple: '#6B46C1',
            deepPurple: '#4B0082',
            grey: '#A0AEC0',
            lightGrey: '#CBD5E0',
            matrix: '#6B46C1'
        };
        
        // System nodes
        let nodes = [
            { id: 'web', x: width * 0.2, y: height * 0.35, label: 'Django Web', type: 'web' },
            { id: 'celery', x: width * 0.35, y: height * 0.55, label: 'Celery Workers', type: 'celery' },
            { id: 'redis', x: width * 0.5, y: height * 0.45, label: 'Redis', type: 'redis' },
            { id: 'postgres', x: width * 0.65, y: height * 0.6, label: 'PostgreSQL + PostGIS', type: 'db' },
            { id: 'zcash', x: width * 0.75, y: height * 0.35, label: 'Zcash RPC / ZSA', type: 'zcash' },
            { id: 'legal', x: width * 0.45, y: height * 0.25, label: 'Legal Shield (AI)', type: 'ai' },
            { id: 'otel', x: width * 0.85, y: height * 0.55, label: 'OpenTelemetry', type: 'otel' },
        ];
        
        // Connections between nodes (trace flows)
        let connections = [
            { from: 'web', to: 'celery' },
            { from: 'celery', to: 'redis' },
            { from: 'web', to: 'postgres' },
            { from: 'celery', to: 'postgres' },
            { from: 'web', to: 'zcash' },
            { from: 'web', to: 'legal' },
            { from: 'legal', to: 'celery' },
            { from: 'zcash', to: 'otel' },
            { from: 'celery', to: 'otel' },
        ];
        
        // Particles for matrix-style animation
        let particles = [];
        
        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.8 + 0.3,
                    opacity: Math.random() * 0.6 + 0.2
                });
            }
        }
        
        function drawMatrixRain() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.08)';
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = colors.matrix;
            ctx.font = '13px monospace';
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                
                // Draw subtle matrix characters
                const chars = '01アイウエオカキクケコ';
                const char = chars[Math.floor(Math.random() * chars.length)];
                
                ctx.globalAlpha = p.opacity;
                ctx.fillText(char, p.x, p.y);
                
                p.y += p.speed;
                
                if (p.y > height) {
                    p.y = 0;
                    p.x = Math.random() * width;
                }
                
                // Occasionally reset opacity for flickering effect
                if (Math.random() < 0.02) {
                    p.opacity = Math.random() * 0.6 + 0.2;
                }
            }
            
            ctx.globalAlpha = 1;
        }
        
        function drawNode(node) {
            const isActive = Math.random() > 0.7; // Simulate activity
            
            // Glow effect
            ctx.shadowBlur = isActive ? 25 : 12;
            ctx.shadowColor = node.type === 'web' || node.type === 'zcash' ? colors.purple : colors.deepPurple;
            
            // Node circle
            ctx.beginPath();
            ctx.arc(node.x, node.y, 28, 0, Math.PI * 2);
            ctx.fillStyle = colors.obsidian;
            ctx.fill();
            
            ctx.strokeStyle = node.type === 'web' || node.type === 'zcash' ? colors.purple : colors.grey;
            ctx.lineWidth = isActive ? 3 : 1.5;
            ctx.stroke();
            
            // Inner glow
            ctx.beginPath();
            ctx.arc(node.x, node.y, 18, 0, Math.PI * 2);
            ctx.fillStyle = isActive ? 'rgba(107, 70, 193, 0.15)' : 'rgba(160, 174, 192, 0.08)';
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            // Label
            ctx.fillStyle = colors.lightGrey;
            ctx.font = '13px Inter, system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(node.label, node.x, node.y + 48);
        }
        
        function drawConnection(fromNode, toNode, progress) {
            ctx.beginPath();
            ctx.moveTo(fromNode.x, fromNode.y);
            ctx.lineTo(toNode.x, toNode.y);
            
            // Gradient line
            const gradient = ctx.createLinearGradient(fromNode.x, fromNode.y, toNode.x, toNode.y);
            gradient.addColorStop(0, 'rgba(107, 70, 193, 0.3)');
            gradient.addColorStop(1, 'rgba(160, 174, 192, 0.15)');
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // Animated data flow particle
            if (progress !== undefined) {
                const x = fromNode.x + (toNode.x - fromNode.x) * progress;
                const y = fromNode.y + (toNode.y - fromNode.y) * progress;
                
                ctx.beginPath();
                ctx.arc(x, y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = colors.purple;
                ctx.shadowBlur = 15;
                ctx.shadowColor = colors.purple;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        let flowProgress = 0;
        
        function animate() {
            ctx.fillStyle = colors.obsidian;
            ctx.fillRect(0, 0, width, height);
            
            // Draw matrix rain background
            drawMatrixRain();
            
            // Draw connections with animated flow
            connections.forEach((conn, index) => {
                const fromNode = nodes.find(n => n.id === conn.from);
                const toNode = nodes.find(n => n.id === conn.to);
                
                if (fromNode && toNode) {
                    const progress = (flowProgress + index * 0.15) % 1;
                    drawConnection(fromNode, toNode, progress);
                }
            });
            
            // Draw nodes
            nodes.forEach(node => {
                drawNode(node);
            });
            
            // Update flow animation
            flowProgress += 0.008;
            if (flowProgress > 1) flowProgress = 0;
            
            // Occasionally update trace info
            if (Math.random() < 0.03) {
                updateTraceInfo();
            }
            
            requestAnimationFrame(animate);
        }
        
        function updateTraceInfo() {
            const traceIdEl = document.getElementById('trace-id');
            const spanEl = document.getElementById('span-name');
            const durationEl = document.getElementById('duration');
            
            const spans = ['zsa_issuance', 'document_process', 'celery_task', 'db_query', 'zcash_rpc'];
            const randomSpan = spans[Math.floor(Math.random() * spans.length)];
            
            traceIdEl.textContent = 'zreal-' + Math.random().toString(16).substr(2, 8);
            spanEl.textContent = randomSpan;
            durationEl.textContent = Math.floor(Math.random() * 280 + 40) + 'ms';
        }
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // Reposition nodes on resize
            nodes.forEach((node, i) => {
                node.x = width * (0.15 + (i % 4) * 0.2);
                node.y = height * (0.25 + Math.floor(i / 4) * 0.35);
            });
        }
        
        function init() {
            createParticles();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Start the animation
            animate();
            
            // Initial trace info
            setTimeout(updateTraceInfo, 1500);
            
            // Simulate new traces
            setInterval(() => {
                if (Math.random() > 0.6) {
                    updateTraceInfo();
                }
            }, 4200);
        }
        
        // Keyboard interaction
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                // Reset animation
                flowProgress = 0;
                createParticles();
            }
        });
        
        // Start everything
        init();
        
        // Easter egg: Click to create trace burst
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // Create burst effect
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: clickX,
                    y: clickY,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 1,
                    opacity: 0.9
                });
            }
        });
    </script>
</body>
</html>
